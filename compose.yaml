services:
  postgres:
    image: postgres:16-alpine
    container_name: compushare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: compushare
      POSTGRES_USER: compushare
      POSTGRES_PASSWORD: compushare
    ports:
      - "5432:5432"
    volumes:
      - compushare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compushare -d compushare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  compushare-postgres-data:
